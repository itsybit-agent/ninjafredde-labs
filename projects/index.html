<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NinjaFredde // Projects</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
  }
  
  h1 { font-size: 2.5em; font-weight: 300; margin-bottom: 10px; letter-spacing: 0.1em; }
  .subtitle { color: #666; margin-bottom: 12px; font-size: 1.1em; }
  
  .slot-meter {
    color: #666;
    font-size: 0.9em;
    margin-bottom: 40px;
  }
  .slot-meter .used { color: #f0c040; font-weight: 600; }
  .slot-meter .full { color: #e04040; font-weight: 600; }
  
  .section-label {
    width: 100%;
    max-width: 1000px;
    font-size: 0.8em;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: #444;
    margin: 30px 0 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid #1a1a1a;
  }
  .section-label:first-of-type { margin-top: 0; }
  
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    max-width: 1000px;
    width: 100%;
  }
  
  .card {
    background: #151515;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 24px;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    border-color: #444;
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }
  .card.active { border-left: 3px solid #f0c040; }
  .card.active:hover { border-color: #f0c040; }
  .card.running { border-left: 3px solid #40c060; }
  .card.running:hover { border-color: #40c060; }
  .card.ondeck { border-left: 3px solid #4080f0; }
  .card.ondeck:hover { border-color: #4080f0; }
  .card.parked { border-left: 3px solid #333; opacity: 0.6; }
  .card.parked:hover { opacity: 0.8; border-color: #555; }
  
  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .card-icon { font-size: 2.2em; }
  .card-title { font-size: 1.3em; font-weight: 500; flex: 1; }
  
  .card-tagline {
    color: #888;
    font-size: 0.9em;
    line-height: 1.5;
    margin-bottom: 16px;
    flex: 1;
  }
  
  .ship-date {
    font-size: 0.85em;
    color: #f08040;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .ship-date .days { font-weight: 700; }
  .ship-date.overdue { color: #e04040; }
  
  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .progress-track {
    flex: 1;
    height: 6px;
    background: #1a1a1a;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }
  .fill-active { background: linear-gradient(90deg, #f0c040, #f08040); }
  .fill-running { background: #40c060; }
  .fill-ondeck { background: #4080f0; }
  .fill-parked { background: #333; }
  .progress-pct { font-size: 0.8em; color: #666; min-width: 32px; text-align: right; }
  
  .milestones {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 10px;
  }
  .ms {
    font-size: 0.75em;
    padding: 2px 8px;
    border-radius: 3px;
    background: #1a1a1a;
    color: #555;
  }
  .ms.done { background: #122212; color: #5a9a5a; text-decoration: line-through; }
  
  .card-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: auto;
  }
  .tag {
    background: #1a1a1a;
    color: #666;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 0.75em;
  }
  
  .card-notes {
    font-size: 0.8em;
    color: #444;
    font-style: italic;
    margin-top: 8px;
  }
  
  .card-link {
    font-size: 0.8em;
    color: #4080f0;
    text-decoration: none;
    margin-top: 8px;
  }
  .card-link:hover { text-decoration: underline; }
  
  .rule {
    color: #333;
    font-size: 0.75em;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-top: 50px;
    text-align: center;
  }
  
  footer {
    margin-top: 40px;
    color: #444;
    font-size: 0.9em;
  }
  footer a { color: #666; text-decoration: none; }
  footer a:hover { color: #888; }
</style>
</head>
<body>

<h1>NINJAFREDDE</h1>
<p class="subtitle">Project Dashboard</p>
<div class="slot-meter" id="slotMeter"></div>

<div id="content"></div>

<p class="rule">⚠ finish rule — before starting new, one active must ship or park</p>

<footer>
  <a href="../">← Back to Labs</a>
</footer>

<script>
fetch('data.json?' + Date.now()).then(r => r.json()).then(render);

function render(data) {
  const full = data.slots.used >= data.slots.active;
  document.getElementById('slotMeter').innerHTML = 
    `Active slots: <span class="${full ? 'full' : 'used'}">${data.slots.used}</span> / ${data.slots.active}`;
  
  const groups = { active: [], running: [], ondeck: [], parked: [] };
  data.projects.forEach(p => (groups[p.status] || groups.parked).push(p));
  
  const sections = [
    { key: 'active', label: '🔥 Active' },
    { key: 'running', label: '✅ Running' },
    { key: 'ondeck', label: '📋 On Deck' },
    { key: 'parked', label: '💤 Parked' },
  ];
  
  let html = '';
  sections.forEach(s => {
    if (!groups[s.key].length) return;
    html += `<div class="section-label">${s.label}</div><div class="grid">`;
    groups[s.key].forEach(p => html += card(p));
    html += '</div>';
  });
  
  document.getElementById('content').innerHTML = html;
}

function card(p) {
  let ship = '';
  if (p.shipDate) {
    const days = Math.ceil((new Date(p.shipDate) - new Date()) / 86400000);
    const over = days < 0;
    ship = `<div class="ship-date ${over ? 'overdue' : ''}">
      🎯 ${p.shipLabel} — <span class="days">${over ? Math.abs(days) + 'd overdue' : days + 'd left'}</span>
    </div>`;
  }
  
  return `
    <div class="card ${p.status}">
      <div class="card-header">
        <span class="card-icon">${p.emoji}</span>
        <span class="card-title">${p.name}</span>
      </div>
      <div class="card-tagline">${p.tagline}</div>
      ${ship}
      <div class="progress-row">
        <div class="progress-track">
          <div class="progress-fill fill-${p.status}" style="width:${p.progress}%"></div>
        </div>
        <span class="progress-pct">${p.progress}%</span>
      </div>
      <div class="milestones">
        ${p.milestones.map(m => `<span class="ms ${m.done ? 'done' : ''}">${m.done ? '✓' : '○'} ${m.name}</span>`).join('')}
      </div>
      <div class="card-tags">
        <span class="tag">${p.tech}</span>
      </div>
      ${p.notes ? `<div class="card-notes">${p.notes}</div>` : ''}
      ${p.repo ? `<a class="card-link" href="${p.repo}" target="_blank">📂 Repository</a>` : ''}
    </div>`;
}
</script>
</body>
</html>
