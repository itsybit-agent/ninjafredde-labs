<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Blocky Dungeon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #111;
            overflow: hidden;
            font-family: monospace;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        
        #game {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        
        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        /* Touch zones */
        .touch-zones {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: grid;
            grid-template-rows: 1fr 1fr;
            grid-template-columns: 1fr 1fr;
            pointer-events: auto;
            z-index: 10;
        }
        
        .touch-zone {
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.1);
            font-size: 3em;
            transition: background 0.1s;
        }
        
        .touch-zone:active {
            background: rgba(255,255,255,0.1);
        }
        
        .zone-forward { grid-column: 1 / 3; }
        .zone-left { }
        .zone-right { }
        
        /* Minimal HUD */
        #hud {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-size: 12px;
            z-index: 20;
            text-align: center;
        }
        
        /* Direction indicator */
        #compass {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 24px;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div id="game"></div>
    
    <div class="touch-zones">
        <div class="touch-zone zone-forward" data-action="forward">↑</div>
        <div class="touch-zone zone-left" data-action="left">←</div>

    <div id="compass">N</div>
    <div id="hud">TAP TO MOVE</div>
    <div id="players" style="position:fixed;top:20px;left:20px;color:#666;font-size:12px;z-index:20;">👻 0</div>
    
    <!-- Firebase -->

    <script type="importmap">
    {

    <script type="module">
    import * as THREE from 'three';
    
    // ============================================
    // GAME CONFIG
    // ============================================
    const GRID_SIZE = 10;
    const CELL_SIZE = 2;
    const MOVE_SPEED = 0.2;
    const TURN_SPEED = 0.18;
    
    // Direction vectors (N, E, S, W)
    const DIRECTIONS = [
        { x: 0, z: -1, name: 'N' },  // North
        { x: 1, z: 0, name: 'E' },   // East
        { x: 0, z: 1, name: 'S' },   // South
        { x: -1, z: 0, name: 'W' }   // West
    ];
    
    // ============================================
    // PLAYER STATE
    // ============================================
    const player = {
        gridX: 1,
        gridZ: 1,
        dir: 0,  // 0=N, 1=E, 2=S, 3=W
        // Rendering position (lerped)
        x: 0,
        z: 0,
        rotation: 0,
        // Target position
        targetX: 0,
        targetZ: 0,
        targetRotation: 0,
        // State
        moving: false
    };
    
    // ============================================
    // MAZE GENERATION
    // ============================================
    let maze = [];
    
    function generateMaze() {
        // Initialize with walls
        maze = Array(GRID_SIZE).fill(null).map(() => 
            Array(GRID_SIZE).fill(1)
        );
        
        // Simple recursive backtracking maze
        const stack = [];
        const startX = 1;
        const startZ = 1;
        
        maze[startZ][startX] = 0;
        stack.push({ x: startX, z: startZ });
        
        while (stack.length > 0) {
            const current = stack[stack.length - 1];
            const neighbors = getUnvisitedNeighbors(current.x, current.z);
            
            if (neighbors.length === 0) {
                stack.pop();
            } else {
                const next = neighbors[Math.floor(Math.random() * neighbors.length)];
                
                // Remove wall between current and next
                const wallX = current.x + (next.x - current.x) / 2;
                const wallZ = current.z + (next.z - current.z) / 2;
                maze[wallZ][wallX] = 0;
                maze[next.z][next.x] = 0;
                
                stack.push(next);
            }
        }
        
        // Ensure spawn area is clear (2x2 around start)
        maze[1][1] = 0;
        maze[1][2] = 0;
        maze[2][1] = 0;
        maze[2][2] = 0;
    }
    
    function getUnvisitedNeighbors(x, z) {
        const neighbors = [];
        const dirs = [
            { x: 0, z: -2 },
            { x: 2, z: 0 },
            { x: 0, z: 2 },
            { x: -2, z: 0 }
        ];
        
        for (const dir of dirs) {
            const nx = x + dir.x;
            const nz = z + dir.z;
            
            if (nx > 0 && nx < GRID_SIZE - 1 && 
                nz > 0 && nz < GRID_SIZE - 1 && 
                maze[nz][nx] === 1) {
                neighbors.push({ x: nx, z: nz });
            }
        }
        
        return neighbors;
    }
    
    function isWall(x, z) {
        if (x < 0 || x >= GRID_SIZE || z < 0 || z >= GRID_SIZE) return true;
        return maze[z][x] === 1;
    }
    
    // ============================================
    // THREE.JS SETUP
    // ============================================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);
    scene.fog = new THREE.Fog(0x111111, 4, 18);
    
    // Retro resolution
    const RENDER_WIDTH = 320;
    const RENDER_HEIGHT = 240;
    
    const camera = new THREE.PerspectiveCamera(75, RENDER_WIDTH / RENDER_HEIGHT, 0.1, 100);
    
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(RENDER_WIDTH, RENDER_HEIGHT);
    renderer.setPixelRatio(1);
    document.getElementById('game').appendChild(renderer.domElement);
    
    // Lighting
    const ambientLight = new THREE.AmbientLight(0x666666, 1);
    scene.add(ambientLight);
    
    const playerLight = new THREE.PointLight(0xffffee, 2, 15);
    playerLight.position.set(0, 1, 0);
    scene.add(playerLight);
    
    // ============================================
    // TEXTURE LOADING
    // ============================================
    const textureLoader = new THREE.TextureLoader();
    
    function loadPixelTexture(path) {
        const tex = textureLoader.load(path);
        tex.magFilter = THREE.NearestFilter;
        tex.minFilter = THREE.NearestFilter;
        tex.wrapS = THREE.RepeatWrapping;
        tex.wrapT = THREE.RepeatWrapping;
        tex.colorSpace = THREE.SRGBColorSpace;
        return tex;
    }
    
    // Load textures (drop your pixel art PNGs in textures/ folder)
    const wallTex = loadPixelTexture('textures/wall.png');
    const floorTex = loadPixelTexture('textures/floor.png');
    const ceilingTex = loadPixelTexture('textures/ceiling.png');
    
    // Floor/ceiling repeat across the whole grid
    floorTex.repeat.set(GRID_SIZE, GRID_SIZE);
    ceilingTex.repeat.set(GRID_SIZE, GRID_SIZE);
    
    // Materials
    const wallMaterial = new THREE.MeshStandardMaterial({ 
        map: wallTex,
        roughness: 0.9
    });
    
    const floorMaterial = new THREE.MeshStandardMaterial({ 
        map: floorTex,
        roughness: 0.95
    });
    
    const ceilingMaterial = new THREE.MeshStandardMaterial({ 
        map: ceilingTex,
        roughness: 0.95
    });
    
    // ============================================
    // BUILD LEVEL
    // ============================================
    function buildLevel() {
        // Clear existing
        while (scene.children.length > 2) {
            scene.remove(scene.children[2]);
        }
        
        // Floor
        const floorGeom = new THREE.PlaneGeometry(GRID_SIZE * CELL_SIZE, GRID_SIZE * CELL_SIZE);
        const floor = new THREE.Mesh(floorGeom, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.position.set(GRID_SIZE * CELL_SIZE / 2 - CELL_SIZE / 2, 0, GRID_SIZE * CELL_SIZE / 2 - CELL_SIZE / 2);
        scene.add(floor);
        
        // Ceiling
        const ceiling = new THREE.Mesh(floorGeom, ceilingMaterial);
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.set(GRID_SIZE * CELL_SIZE / 2 - CELL_SIZE / 2, CELL_SIZE, GRID_SIZE * CELL_SIZE / 2 - CELL_SIZE / 2);
        scene.add(ceiling);
        
        // Walls
        const wallGeom = new THREE.BoxGeometry(CELL_SIZE, CELL_SIZE, CELL_SIZE);
        
        for (let z = 0; z < GRID_SIZE; z++) {
            for (let x = 0; x < GRID_SIZE; x++) {
                if (maze[z][x] === 1) {
                    const wall = new THREE.Mesh(wallGeom, wallMaterial);
                    wall.position.set(
                        x * CELL_SIZE,
                        CELL_SIZE / 2,
                        z * CELL_SIZE
                    );
                    scene.add(wall);
                }
            }
        }
    }
    
    // ============================================
    // PLAYER MOVEMENT
    // ============================================
    function moveForward() {
        if (player.moving) return;
        
        const dir = DIRECTIONS[player.dir];
        const newX = player.gridX + dir.x;
        const newZ = player.gridZ + dir.z;
        
        if (!isWall(newX, newZ)) {
            player.gridX = newX;
            player.gridZ = newZ;
            player.targetX = newX * CELL_SIZE;
            player.targetZ = newZ * CELL_SIZE;
            player.moving = true;
        }
    }
    
    function moveBackward() {
        if (player.moving) return;
        
        const dir = DIRECTIONS[player.dir];
        const newX = player.gridX - dir.x;
        const newZ = player.gridZ - dir.z;
        
        if (!isWall(newX, newZ)) {
            player.gridX = newX;
            player.gridZ = newZ;
            player.targetX = newX * CELL_SIZE;
            player.targetZ = newZ * CELL_SIZE;
            player.moving = true;
        }
    }
    
    function turnLeft() {
        if (player.moving) return;
        
        player.dir = (player.dir + 3) % 4;
        player.targetRotation = player.dir * Math.PI / 2;
        player.moving = true;
        updateCompass();
    }
    
    function turnRight() {
        if (player.moving) return;
        
        player.dir = (player.dir + 1) % 4;
        player.targetRotation = player.dir * Math.PI / 2;
        player.moving = true;
        updateCompass();
    }
    
    function updateCompass() {
        document.getElementById('compass').textContent = DIRECTIONS[player.dir].name;
    }
    
    // ============================================
    // INPUT HANDLING
    // ============================================
    document.querySelectorAll('.touch-zone').forEach(zone => {
        const action = zone.dataset.action;
        
        // Handle both touch and click
        const doAction = () => {
            console.log('Action:', action);
            if (action === 'forward') moveForward();
            else if (action === 'back') moveBackward();
            else if (action === 'left') turnLeft();
            else if (action === 'right') turnRight();
        };
        
        zone.addEventListener('click', doAction);
        
        zone.addEventListener('touchstart', (e) => {
            e.preventDefault();
            zone.style.background = 'rgba(255,255,255,0.2)';
            doAction();
        }, { passive: false });
        
        zone.addEventListener('touchend', (e) => {
            e.preventDefault();
            zone.style.background = '';
        }, { passive: false });
    });
    
    // Keyboard support
    document.addEventListener('keydown', (e) => {
        switch (e.key) {
            case 'ArrowUp':
            case 'w':
            case 'W':
                moveForward();
                break;
            case 'ArrowDown':
            case 's':
            case 'S':
                moveBackward();
                break;
            case 'ArrowLeft':
            case 'a':
            case 'A':
                turnLeft();
                break;
            case 'ArrowRight':
            case 'd':
            case 'D':
                turnRight();
                break;
        }
    });
    
    // ============================================
    // GAME LOOP
    // ============================================
    function lerp(a, b, t) {
        return a + (b - a) * t;
    }
    
    function lerpAngle(a, b, t) {
        // Handle angle wrapping
        let diff = b - a;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        return a + diff * t;
    }
    
    let moveTimer = 0;
    
    function update() {
        // Lerp position
        player.x = lerp(player.x, player.targetX, MOVE_SPEED);
        player.z = lerp(player.z, player.targetZ, MOVE_SPEED);
        player.rotation = lerpAngle(player.rotation, player.targetRotation, TURN_SPEED);
        
        // Check if movement complete
        const posDiff = Math.abs(player.x - player.targetX) + Math.abs(player.z - player.targetZ);
        const rotDiff = Math.abs(player.rotation - player.targetRotation);
        
        if (player.moving) {
            moveTimer++;
            // Complete if close enough OR timeout (safety)
            if ((posDiff < 0.05 && rotDiff < 0.05) || moveTimer > 60) {
                player.x = player.targetX;
                player.z = player.targetZ;
                player.rotation = player.targetRotation;
                player.moving = false;
                moveTimer = 0;
            }
        }
        
        // Update camera
        camera.position.set(player.x, 1, player.z);
        camera.rotation.y = -player.rotation;
        
        // Update light position
        playerLight.position.set(player.x, 1.5, player.z);
    }
    
    function animate() {
        requestAnimationFrame(animate);
        update();
        updateGhosts();
        updateSkeletons();
        renderer.render(scene, camera);
    }
    
    // ============================================
    // INIT
    // ============================================
    function init() {
        generateMaze();
        buildLevel();
        spawnInitialSkeletons();
        
        // Set initial position - start facing South (into the maze)
        player.gridX = 1;
        player.gridZ = 1;
        player.dir = 2; // South
        player.x = player.gridX * CELL_SIZE;
        player.z = player.gridZ * CELL_SIZE;
        player.targetX = player.x;
        player.targetZ = player.z;
        player.rotation = player.dir * Math.PI / 2;
        player.targetRotation = player.rotation;
        
        updateCompass();
        animate();
        
        console.log('Maze generated, player at', player.gridX, player.gridZ, 'facing', DIRECTIONS[player.dir].name);
    }
    
    // Fixed resolution - no resize needed
    // That chunky 320x240 goodness stays chunky!
    
    // ============================================
    // MULTIPLAYER - Ghost Sprites (Billboard)
    // ============================================
    const otherPlayers = {};  // id -> { light, sprite, x, z, lastSeen }
    const GHOST_COLOR = 0xff6600;
    const STALE_TIMEOUT = 30000;  // 30 seconds
    
    // Ghost sprite setup
    const ghostTex = loadPixelTexture('textures/ghost.png');
    
    // Pac-Man style ghost colors!
    const GHOST_COLORS = [
        0xff6666,  // Red (Blinky)
        0x66ffff,  // Cyan (Inky)
        0xffb8ff,  // Pink (Pinky)
        0xffb852,  // Orange (Clyde)
        0x66ff66,  // Green
        0xffff66,  // Yellow
        0xb866ff,  // Purple
        0x66b8ff,  // Blue
    ];
    
    function getGhostColor(playerId) {
        // Hash the ID to get consistent color per player
        let hash = 0;
        for (let i = 0; i < playerId.length; i++) {
            hash = ((hash << 5) - hash) + playerId.charCodeAt(i);
        }
        return GHOST_COLORS[Math.abs(hash) % GHOST_COLORS.length];
    }
    
    // ============================================
    // SKELETONS
    // ============================================
    const skeletonTextures = {
        idle: loadPixelTexture('textures/skeleton_idle.png'),
        attack: loadPixelTexture('textures/skeleton_attack.png'),
        hit: loadPixelTexture('textures/skeleton_hit.png')
    };
    
    const skeletons = [];
    const SKELETON_SPEED = 0.02;
    const SKELETON_ATTACK_RANGE = 1.5;
    const SKELETON_ATTACK_COOLDOWN = 1500;  // ms
    
    function spawnSkeleton(x, z) {
        const material = new THREE.SpriteMaterial({
            map: skeletonTextures.idle,
            transparent: true
        });
        const sprite = new THREE.Sprite(material);
        sprite.scale.set(1.5, 1.5, 1);
        sprite.position.set(x, 1.0, z);
        scene.add(sprite);
        
        skeletons.push({
            sprite,
            material,
            x, z,
            state: 'idle',  // idle, attack, hit
            stateTimer: 0,
            lastAttack: 0,
            hp: 2
        });
    }
    
    function updateSkeletons() {
        const now = Date.now();
        
        for (let i = skeletons.length - 1; i >= 0; i--) {
            const skel = skeletons[i];
            
            // State timer (for hit flash)
            if (skel.state === 'hit' && now - skel.stateTimer > 200) {
                skel.state = 'idle';
            }
            if (skel.state === 'attack' && now - skel.stateTimer > 400) {
                skel.state = 'idle';
            }
            
            // Move toward player
            const dx = player.x - skel.x;
            const dz = player.z - skel.z;
            const dist = Math.sqrt(dx * dx + dz * dz);
            
            if (dist > SKELETON_ATTACK_RANGE && skel.state === 'idle') {
                // Move toward player
                skel.x += (dx / dist) * SKELETON_SPEED;
                skel.z += (dz / dist) * SKELETON_SPEED;
            } else if (dist <= SKELETON_ATTACK_RANGE && skel.state === 'idle') {
                // Attack!
                if (now - skel.lastAttack > SKELETON_ATTACK_COOLDOWN) {
                    skel.state = 'attack';
                    skel.stateTimer = now;
                    skel.lastAttack = now;
                }
            }
            
            // Update sprite position
            skel.sprite.position.x = skel.x;
            skel.sprite.position.z = skel.z;
            skel.sprite.position.y = 1.0 + Math.sin(now * 0.005 + i) * 0.05;
            
            // Update texture based on state
            skel.material.map = skeletonTextures[skel.state];
            skel.material.needsUpdate = true;
        }
    }
    
    function hitSkeleton(index) {
        const skel = skeletons[index];
        skel.hp--;
        skel.state = 'hit';
        skel.stateTimer = Date.now();
        
        if (skel.hp <= 0) {
            // Death!
            scene.remove(skel.sprite);
            skeletons.splice(index, 1);
        }
    }
    
    // Spawn some skeletons in the maze
    function spawnInitialSkeletons() {
        // Find open cells to spawn in
        let spawned = 0;
        for (let z = 3; z < GRID_SIZE - 1 && spawned < 5; z++) {
            for (let x = 3; x < GRID_SIZE - 1 && spawned < 5; x++) {
                if (maze[z][x] === 0 && Math.random() < 0.15) {
                    spawnSkeleton(x * CELL_SIZE, z * CELL_SIZE);
                    spawned++;
                }
            }
        }
    }
    
    // Update our position in Firebase
    function broadcastPosition() {
        if (!window.db) return;
        
        const playerRef = window.db.ref('players/' + window.playerId);
        playerRef.set({
            x: player.x,
            z: player.z,
            dir: player.dir,
            timestamp: Date.now()
        });
        
        // Remove ourselves when we leave
        playerRef.onDisconnect().remove();
    }
    
    // Listen for other players
    function setupMultiplayer() {
        if (!window.db) {
            console.log('Firebase not available');
            return;
        }
        
        const playersRef = window.db.ref('players');
        
        // Listen for changes
        playersRef.on('value', (snapshot) => {
            const data = snapshot.val() || {};
            const now = Date.now();
            let count = 0;
            
            // Update or create lights for other players
            for (const id in data) {
                if (id === window.playerId) continue;  // Skip self
                
                const p = data[id];
                if (now - p.timestamp > STALE_TIMEOUT) continue;  // Skip stale
                
                count++;
                
                if (!otherPlayers[id]) {
                    // Create new ghost light + sprite
                    const light = new THREE.PointLight(GHOST_COLOR, 1.5, 8);
                    light.position.set(p.x, 1.2, p.z);
                    scene.add(light);
                    
                    // Billboard sprite with unique color
                    const ghostColor = getGhostColor(id);
                    const spriteMat = new THREE.SpriteMaterial({ 
                        map: ghostTex,
                        transparent: true,
                        color: ghostColor
                    });
                    const sprite = new THREE.Sprite(spriteMat);
                    sprite.scale.set(1.2, 1.2, 1);
                    sprite.position.set(p.x, 1.0, p.z);
                    scene.add(sprite);
                    
                    // Match light color to sprite
                    light.color.setHex(ghostColor);
                    
                    otherPlayers[id] = { light, sprite, x: p.x, z: p.z, lastSeen: now };
                } else {
                    // Update position (lerp for smooth movement)
                    otherPlayers[id].x = p.x;
                    otherPlayers[id].z = p.z;
                    otherPlayers[id].lastSeen = now;
                }
            }
            
            // Remove stale players
            for (const id in otherPlayers) {
                if (!data[id] || now - data[id].timestamp > STALE_TIMEOUT) {
                    scene.remove(otherPlayers[id].light);
                    scene.remove(otherPlayers[id].sprite);
                    delete otherPlayers[id];
                }
            }
            
            // Update player count
            document.getElementById('players').textContent = '👻 ' + count;
        });
        
        // Broadcast position every 500ms
        setInterval(broadcastPosition, 500);
        
        // Cleanup stale entries periodically (only one client needs to do this)
        setInterval(() => {
            const now = Date.now();
            playersRef.once('value', (snapshot) => {
                const data = snapshot.val() || {};
                for (const id in data) {
                    if (now - data[id].timestamp > STALE_TIMEOUT) {
                        window.db.ref('players/' + id).remove();
                    }
                }
            });
        }, 10000);
        
        console.log('Multiplayer enabled! Player ID:', window.playerId);
    }
    
    // Lerp ghost lights + sprites in update loop
    function updateGhosts() {
        for (const id in otherPlayers) {
            const ghost = otherPlayers[id];
            // Smooth movement
            ghost.light.position.x += (ghost.x - ghost.light.position.x) * 0.1;
            ghost.light.position.z += (ghost.z - ghost.light.position.z) * 0.1;
            ghost.sprite.position.x = ghost.light.position.x;
            ghost.sprite.position.z = ghost.light.position.z;
            // Bobbing animation
            ghost.sprite.position.y = 1.0 + Math.sin(Date.now() * 0.003 + parseInt(id, 36)) * 0.1;
            
            // Flicker effect
            ghost.light.intensity = 1.2 + Math.sin(Date.now() * 0.01 + parseInt(id, 36)) * 0.3;
        }
    }
    
    init();
    setupMultiplayer();
    </script>
</body>
