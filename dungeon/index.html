    <style>

    <script type="module">
    import * as THREE from 'three';
    
    // ============================================
    // GAME CONFIG
    // ============================================
    const GRID_SIZE = 10;
    const CELL_SIZE = 2;
    const MOVE_SPEED = 0.2;
    const TURN_SPEED = 0.18;
    
    // Direction vectors (N, E, S, W)
    const DIRECTIONS = [
        { x: 0, z: -1, name: 'N' },  // North
        { x: 1, z: 0, name: 'E' },   // East
        { x: 0, z: 1, name: 'S' },   // South
        { x: -1, z: 0, name: 'W' }   // West
    ];
    
    // ============================================
    // PLAYER STATE
    // ============================================
    const player = {
        gridX: 1,
        gridZ: 1,
        dir: 0,  // 0=N, 1=E, 2=S, 3=W
        // Rendering position (lerped)
        x: 0,
        z: 0,
        rotation: 0,
        // Target position
        targetX: 0,
        targetZ: 0,
        targetRotation: 0,
        // State
        moving: false
    };
    
    // ============================================
    // MAZE GENERATION
    // ============================================
    let maze = [];
    
    function generateMaze() {
        // Initialize with walls
        maze = Array(GRID_SIZE).fill(null).map(() => 
            Array(GRID_SIZE).fill(1)
        );
        
        // Simple recursive backtracking maze
        const stack = [];
        const startX = 1;
        const startZ = 1;
        
        maze[startZ][startX] = 0;
        stack.push({ x: startX, z: startZ });
        
        while (stack.length > 0) {
            const current = stack[stack.length - 1];
            const neighbors = getUnvisitedNeighbors(current.x, current.z);
            
            if (neighbors.length === 0) {
                stack.pop();
            } else {
                const next = neighbors[Math.floor(Math.random() * neighbors.length)];
                
                // Remove wall between current and next
                const wallX = current.x + (next.x - current.x) / 2;
                const wallZ = current.z + (next.z - current.z) / 2;
                maze[wallZ][wallX] = 0;
                maze[next.z][next.x] = 0;
                
                stack.push(next);
            }
        }
        
        // Ensure spawn area is clear (2x2 around start)
        maze[1][1] = 0;
        maze[1][2] = 0;
        maze[2][1] = 0;
        maze[2][2] = 0;
    }
    
    function getUnvisitedNeighbors(x, z) {
        const neighbors = [];
        const dirs = [
            { x: 0, z: -2 },
            { x: 2, z: 0 },
            { x: 0, z: 2 },
            { x: -2, z: 0 }
        ];
        
        for (const dir of dirs) {
            const nx = x + dir.x;
            const nz = z + dir.z;
            
            if (nx > 0 && nx < GRID_SIZE - 1 && 
                nz > 0 && nz < GRID_SIZE - 1 && 
                maze[nz][nx] === 1) {
                neighbors.push({ x: nx, z: nz });
            }
        }
        
        return neighbors;
    }
    
    function isWall(x, z) {
        if (x < 0 || x >= GRID_SIZE || z < 0 || z >= GRID_SIZE) return true;
        return maze[z][x] === 1;
    }
    
    // ============================================
    // THREE.JS SETUP
    // ============================================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);
    scene.fog = new THREE.Fog(0x111111, 2, 12);  // Denser fog
    
    // Retro resolution
    const RENDER_WIDTH = 320;
    const RENDER_HEIGHT = 240;
    
    const camera = new THREE.PerspectiveCamera(75, RENDER_WIDTH / RENDER_HEIGHT, 0.1, 100);
    
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(RENDER_WIDTH, RENDER_HEIGHT);
    renderer.setPixelRatio(1);
    document.getElementById('game').appendChild(renderer.domElement);
    
    // Lighting
    const ambientLight = new THREE.AmbientLight(0x888888, 1.3);  // Brighter ambient
    scene.add(ambientLight);
    
    const playerLight = new THREE.PointLight(0xffffee, 2, 15);
    playerLight.position.set(0, 1, 0);
    scene.add(playerLight);
    
    // ============================================
    // TEXTURE LOADING
    // ============================================
    const textureLoader = new THREE.TextureLoader();
    
    function loadPixelTexture(path) {
        const tex = textureLoader.load(path);
        tex.magFilter = THREE.NearestFilter;
        tex.minFilter = THREE.NearestFilter;
        tex.wrapS = THREE.RepeatWrapping;
        tex.wrapT = THREE.RepeatWrapping;
        tex.colorSpace = THREE.SRGBColorSpace;
        return tex;
    }
    
    // Load textures (drop your pixel art PNGs in textures/ folder)
    const wallTex = loadPixelTexture('textures/wall.png');
    const floorTex = loadPixelTexture('textures/floor.png');
    const ceilingTex = loadPixelTexture('textures/ceiling.png');
    
    // Floor/ceiling repeat across the whole grid
    floorTex.repeat.set(GRID_SIZE, GRID_SIZE);
    ceilingTex.repeat.set(GRID_SIZE, GRID_SIZE);
    
    // Materials
    const wallMaterial = new THREE.MeshStandardMaterial({ 
        map: wallTex,
        roughness: 0.9
    });
    
    const floorMaterial = new THREE.MeshStandardMaterial({ 
        map: floorTex,
        roughness: 0.95
    });
    
    const ceilingMaterial = new THREE.MeshStandardMaterial({ 
        map: ceilingTex,
        roughness: 0.95
    });
    
    // ============================================
    // BUILD LEVEL
    // ============================================
    function buildLevel() {
        // Clear existing
        while (scene.children.length > 2) {
            scene.remove(scene.children[2]);
        }
        
        // Floor
        const floorGeom = new THREE.PlaneGeometry(GRID_SIZE * CELL_SIZE, GRID_SIZE * CELL_SIZE);
        const floor = new THREE.Mesh(floorGeom, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.position.set(GRID_SIZE * CELL_SIZE / 2 - CELL_SIZE / 2, 0, GRID_SIZE * CELL_SIZE / 2 - CELL_SIZE / 2);
        scene.add(floor);
        
        // Ceiling
        const ceiling = new THREE.Mesh(floorGeom, ceilingMaterial);
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.set(GRID_SIZE * CELL_SIZE / 2 - CELL_SIZE / 2, CELL_SIZE, GRID_SIZE * CELL_SIZE / 2 - CELL_SIZE / 2);
        scene.add(ceiling);
        
        // Walls
        const wallGeom = new THREE.BoxGeometry(CELL_SIZE, CELL_SIZE, CELL_SIZE);
        
        for (let z = 0; z < GRID_SIZE; z++) {
            for (let x = 0; x < GRID_SIZE; x++) {
                if (maze[z][x] === 1) {
                    const wall = new THREE.Mesh(wallGeom, wallMaterial);
                    wall.position.set(
                        x * CELL_SIZE,
                        CELL_SIZE / 2,
                        z * CELL_SIZE
                    );
                    scene.add(wall);
                }
            }
        }
    }
    
    // ============================================
    // PLAYER MOVEMENT
    // ============================================
    function moveForward() {
        if (isGameOver) return;
        if (player.moving) return;
        
        const dir = DIRECTIONS[player.dir];
        const newX = player.gridX + dir.x;
        const newZ = player.gridZ + dir.z;
        
        if (!isWall(newX, newZ)) {
            player.gridX = newX;
            player.gridZ = newZ;
            player.targetX = newX * CELL_SIZE;
            player.targetZ = newZ * CELL_SIZE;
            player.moving = true;
        }
    }
    
    function moveBackward() {
        if (isGameOver) return;
        if (player.moving) return;
        
        const dir = DIRECTIONS[player.dir];
        const newX = player.gridX - dir.x;
        const newZ = player.gridZ - dir.z;
        
        if (!isWall(newX, newZ)) {
            player.gridX = newX;
            player.gridZ = newZ;
            player.targetX = newX * CELL_SIZE;
            player.targetZ = newZ * CELL_SIZE;
            player.moving = true;
        }
    }
    
    function turnLeft() {
        if (isGameOver) return;
        if (player.moving) return;
        
        player.dir = (player.dir + 3) % 4;
        player.targetRotation = player.dir * Math.PI / 2;
        player.moving = true;
        updateCompass();
    }
    
    function turnRight() {
        if (isGameOver) return;
        if (player.moving) return;
        
        player.dir = (player.dir + 1) % 4;
        player.targetRotation = player.dir * Math.PI / 2;
        player.moving = true;
        updateCompass();
    }
    
    function updateCompass() {
        document.getElementById('compass').textContent = DIRECTIONS[player.dir].name;
    }
    
    // ============================================
    // INPUT HANDLING
    // ============================================
    // Swipe gesture controls
    let touchStartX = 0;
    let touchStartY = 0;
    let touchStartTime = 0;
    const SWIPE_THRESHOLD = 30;  // Min distance for swipe
    const TAP_THRESHOLD = 10;    // Max movement for tap
    const TAP_TIME = 200;        // Max time for tap (ms)
    
    document.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        touchStartTime = Date.now();
    }, { passive: true });
    
    document.addEventListener('touchend', (e) => {
        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;
        const deltaX = touchEndX - touchStartX;
        const deltaY = touchEndY - touchStartY;
        const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
        const elapsed = Date.now() - touchStartTime;
        
        // Tap = attack
        if (distance < TAP_THRESHOLD && elapsed < TAP_TIME) {
            playerAttack();
            return;
        }
        
        // Swipe detection
        if (distance > SWIPE_THRESHOLD) {
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                // Horizontal swipe
                if (deltaX > 0) turnRight();
                else turnLeft();
            } else {
                // Vertical swipe
                if (deltaY < 0) moveForward();
                else moveBackward();
            }
        }
    }, { passive: true });
    
    // Keyboard support
    document.addEventListener('keydown', (e) => {
        switch (e.key) {
            case 'ArrowUp':
            case 'w':
            case 'W':
                moveForward();
                break;
            case 'ArrowDown':
            case 's':
            case 'S':
                moveBackward();
                break;
            case 'ArrowLeft':
            case 'a':
            case 'A':
                turnLeft();
                break;
            case 'ArrowRight':
            case 'd':
            case 'D':
                turnRight();
                break;
            case ' ':
                playerAttack();
                break;
        }
    });
    
    function playerAttack() {
        if (isGameOver) return;
        if (playerCombat.state !== 'idle') return;
        
        playerCombat.state = 'swing';
        playerCombat.stateTimer = Date.now();
        
        // Check for skeleton in front of player
        const dir = DIRECTIONS[player.dir];
        const targetX = player.gridX + dir.x;
        const targetZ = player.gridZ + dir.z;
        
        for (let i = skeletons.length - 1; i >= 0; i--) {
            const skel = skeletons[i];
            if (skel.gridX === targetX && skel.gridZ === targetZ) {
                hitSkeleton(i);
                break;  // Only hit one
            }
        }
    }
    
    // ============================================
    // GAME LOOP
    // ============================================
    function lerp(a, b, t) {
        return a + (b - a) * t;
    }
    
    function lerpAngle(a, b, t) {
        // Handle angle wrapping
        let diff = b - a;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        return a + diff * t;
    }
    
    let moveTimer = 0;
    
    function update() {
        // Lerp position
        player.x = lerp(player.x, player.targetX, MOVE_SPEED);
        player.z = lerp(player.z, player.targetZ, MOVE_SPEED);
        player.rotation = lerpAngle(player.rotation, player.targetRotation, TURN_SPEED);
        
        // Check if movement complete
        const posDiff = Math.abs(player.x - player.targetX) + Math.abs(player.z - player.targetZ);
        const rotDiff = Math.abs(player.rotation - player.targetRotation);
        
        if (player.moving) {
            moveTimer++;
            // Complete if close enough OR timeout (safety)
            if ((posDiff < 0.05 && rotDiff < 0.05) || moveTimer > 60) {
                player.x = player.targetX;
                player.z = player.targetZ;
                player.rotation = player.targetRotation;
                player.moving = false;
                moveTimer = 0;
            }
        }
        
        // Update camera
        camera.position.set(player.x, 1, player.z);
        camera.rotation.y = -player.rotation;
        
        // Update light position
        playerLight.position.set(player.x, 1.5, player.z);
        
        // Update player sprite
        playerSprite.position.set(player.x, 1.0, player.z);
        
        // Player state timer
        const now = Date.now();
        if (playerCombat.state === 'swing' && now - playerCombat.stateTimer > 300) {
            playerCombat.state = 'idle';
        }
        if (playerCombat.state === 'hit' && now - playerCombat.stateTimer > 200) {
            playerCombat.state = 'idle';
        }
        playerMaterial.map = knightTextures[playerCombat.state];
        playerMaterial.needsUpdate = true;
        
        // Health regen
        if (playerCombat.hp < playerCombat.maxHp && playerCombat.hp > 0) {
            const timeSinceDamage = now - playerCombat.lastDamage;
            if (timeSinceDamage > REGEN_DELAY) {
                const regenTicks = Math.floor((timeSinceDamage - REGEN_DELAY) / REGEN_INTERVAL);
                const targetHp = Math.min(playerCombat.maxHp, 1 + regenTicks);
                if (targetHp > playerCombat.hp) {
                    playerCombat.hp = targetHp;
                    updateHeartsDisplay();
                    flashScreen('#00ff00');  // Green flash for heal!
                }
            }
        }
    }
    
    function animate() {
        requestAnimationFrame(animate);
        update();
        updateGhosts();
        updateSkeletons();
        renderer.render(scene, camera);
    }
    
    // ============================================
    // INIT
    // ============================================
    function init() {
        generateMaze();
        buildLevel();
        loadFloor(1, mazeSeed);
        showFloorText(1);
        
        // Set initial position - start facing South (into the maze)
        player.gridX = 1;
        player.gridZ = 1;
        player.dir = 2; // South
        player.x = player.gridX * CELL_SIZE;
        player.z = player.gridZ * CELL_SIZE;
        player.targetX = player.x;
        player.targetZ = player.z;
        player.rotation = player.dir * Math.PI / 2;
        player.targetRotation = player.rotation;
        
        updateCompass();
        animate();
        
        console.log('Maze generated, player at', player.gridX, player.gridZ, 'facing', DIRECTIONS[player.dir].name);
    }
    
    // Fixed resolution - no resize needed
    // That chunky 320x240 goodness stays chunky!
    
    // ============================================
    // MULTIPLAYER - Ghost Sprites (Billboard)
    // ============================================
    const otherPlayers = {};  // id -> { light, sprite, x, z, lastSeen }
    const GHOST_COLOR = 0xff6600;
    const STALE_TIMEOUT = 30000;  // 30 seconds
    
    // Ghost sprite setup
    const ghostTex = loadPixelTexture('textures/ghost.png');
    
    // Pac-Man style ghost colors!
    const GHOST_COLORS = [
        0xff6666,  // Red (Blinky)
        0x66ffff,  // Cyan (Inky)
        0xffb8ff,  // Pink (Pinky)
        0xffb852,  // Orange (Clyde)
        0x66ff66,  // Green
        0xffff66,  // Yellow
        0xb866ff,  // Purple
        0x66b8ff,  // Blue
    ];
    
    function getGhostColor(playerId) {
        // Hash the ID to get consistent color per player
        let hash = 0;
        for (let i = 0; i < playerId.length; i++) {
            hash = ((hash << 5) - hash) + playerId.charCodeAt(i);
        }
        return GHOST_COLORS[Math.abs(hash) % GHOST_COLORS.length];
    }
    
    // ============================================
    // SKELETONS
    // ============================================
    const skeletonTextures = {
        idle: loadPixelTexture('textures/skeleton_idle.png'),
        attack: loadPixelTexture('textures/skeleton_attack.png'),
        hit: loadPixelTexture('textures/skeleton_hit.png')
    };
    
    const knightTextures = {
        idle: loadPixelTexture('textures/knight_idle.png'),
        swing: loadPixelTexture('textures/knight_swing.png'),
        hit: loadPixelTexture('textures/knight_hit.png')
    };
    
    // Player sprite
    const playerMaterial = new THREE.SpriteMaterial({
        map: knightTextures.idle,
        transparent: true
    });
    const playerSprite = new THREE.Sprite(playerMaterial);
    playerSprite.scale.set(1.4, 1.4, 1);
    playerSprite.position.set(0, 1.0, 0);
    scene.add(playerSprite);
    
    // Player combat state
    const playerCombat = {
        state: 'idle',
        stateTimer: 0,
        hp: 3,
        maxHp: 3,
        lastDamage: 0
    };
    
    const REGEN_DELAY = 5000;    // Wait 5s after damage before regen
    const REGEN_INTERVAL = 8000; // Heal 1 heart every 8s
    
    function updateHeartsDisplay() {
        const hearts = document.getElementById('hearts');
        hearts.textContent = '❤️'.repeat(playerCombat.hp) + '🖤'.repeat(playerCombat.maxHp - playerCombat.hp);
    }
    
    function updateFloorDisplay() {
        document.getElementById('floor').textContent = 'FLOOR ' + currentFloor;
    }
    
    function playerTakeDamage() {
        if (playerCombat.state === 'hit') return;  // Invincibility frames
        
        playerCombat.hp--;
        playerCombat.state = 'hit';
        playerCombat.stateTimer = Date.now();
        playerCombat.lastDamage = Date.now();
        updateHeartsDisplay();
        
        // Red flash!
        flashScreen('#ff0000');
        
        if (playerCombat.hp <= 0) {
            // Death! 
            gameOver();
        }
    }
    
    function flashScreen(color) {
        const flash = document.createElement('div');
        flash.style.cssText = `
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: ${color};
            opacity: 0.4;
            z-index: 50;
            pointer-events: none;
        `;
        document.body.appendChild(flash);
        setTimeout(() => flash.remove(), 150);
    }
    
    function gameOver() {
        isGameOver = true;
        showFloorText('GAME OVER');
        
        setTimeout(() => {
            // Reset
            playerCombat.hp = playerCombat.maxHp;
            currentFloor = 1;
            mazeSeed = Math.floor(Math.random() * 1000000);
            updateHeartsDisplay();
            loadFloor(1, mazeSeed);
            updateFloorDisplay();
            isGameOver = false;
        }, 2000);
    }
    
    // ============================================
    // FLOOR PROGRESSION
    // ============================================
    const FLOOR_COLORS = [
        { fog: 0x332211, ambient: 0x997766 },  // Floor 1: warm torch
        { fog: 0x222233, ambient: 0x778899 },  // Floor 2: cool stone
        { fog: 0x223322, ambient: 0x779977 },  // Floor 3: mossy
        { fog: 0x332233, ambient: 0x997799 },  // Floor 4: crypt
        { fog: 0x331111, ambient: 0x996666 },  // Floor 5+: blood
    ];
    
    let currentFloor = 1;
    let mazeSeed = Math.floor(Math.random() * 1000000);
    let floorStartTime = Date.now();
    const FLOOR_GRACE_PERIOD = 2000;  // 2 seconds before skeletons attack
    let isGameOver = false;
    
    function getFloorConfig(floor) {
        const baseSize = 10;
        const baseSkeletons = 3;
        return {
            gridSize: Math.min(baseSize + (floor - 1) * 2, 18),
            skeletonCount: baseSkeletons + (floor - 1) * 2,  // No cap - gets brutal!
            colors: FLOOR_COLORS[Math.min(floor - 1, FLOOR_COLORS.length - 1)]
        };
    }
    
    function applyFloorColors(floor) {
        const config = getFloorConfig(floor);
        scene.fog.color.setHex(config.colors.fog);
        scene.background.setHex(config.colors.fog);
        ambientLight.color.setHex(config.colors.ambient);
    }
    
    function showFloorText(text) {
        const div = document.createElement('div');
        // If it's a number, prefix with FLOOR
        div.textContent = typeof text === 'number' ? 'FLOOR ' + text : text;
        div.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3em;color:#fff;font-family:monospace;z-index:100;text-shadow:0 0 20px #000;';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 1500);
    }
    
    function advanceFloor() {
        currentFloor++;
        mazeSeed = Math.floor(Math.random() * 1000000);
        loadFloor(currentFloor, mazeSeed);
        showFloorText(currentFloor);
        updateFloorDisplay();
        
        // Sync to Firebase
        if (window.db) {
            window.db.ref('world').set({
                floor: currentFloor,
                mazeSeed: mazeSeed,
                timestamp: Date.now()
            });
        }
    }
    
    function loadFloor(floor, seed) {
        const config = getFloorConfig(floor);
        
        // Update grid size (recreate with new size)
        // For simplicity, we'll keep GRID_SIZE constant but scale skeleton count
        
        // Clear existing skeletons
        skeletons.forEach(s => scene.remove(s.sprite));
        skeletons.length = 0;
        
        // Regenerate maze with seed
        Math.seedrandom && Math.seedrandom(seed);
        generateMaze();
        buildLevel();
        
        // Spawn skeletons
        let spawned = 0;
        for (let z = 3; z < GRID_SIZE - 1 && spawned < config.skeletonCount; z++) {
            for (let x = 3; x < GRID_SIZE - 1 && spawned < config.skeletonCount; x++) {
                if (maze[z][x] === 0 && Math.random() < 0.2) {
                    spawnSkeleton(x, z);
                    spawned++;
                }
            }
        }
        
        // Reset player position
        player.gridX = 1;
        player.gridZ = 1;
        player.x = CELL_SIZE;
        player.z = CELL_SIZE;
        player.targetX = CELL_SIZE;
        player.targetZ = CELL_SIZE;
        
        applyFloorColors(floor);
        floorStartTime = Date.now();  // Reset grace period
    }
    
    const skeletons = [];
    const SKELETON_MOVE_INTERVAL = 800;  // ms between moves
    const SKELETON_ATTACK_COOLDOWN = 2500;  // ms - more forgiving
    const SKELETON_LERP_SPEED = 0.1;
    
    function spawnSkeleton(gridX, gridZ) {
        const material = new THREE.SpriteMaterial({
            map: skeletonTextures.idle,
            transparent: true
        });
        const sprite = new THREE.Sprite(material);
        sprite.scale.set(1.5, 1.5, 1);
        const worldX = gridX * CELL_SIZE;
        const worldZ = gridZ * CELL_SIZE;
        sprite.position.set(worldX, 1.0, worldZ);
        scene.add(sprite);
        
        skeletons.push({
            sprite,
            material,
            gridX, gridZ,           // Grid position
            x: worldX, z: worldZ,   // Render position (lerped)
            state: 'idle',
            stateTimer: 0,
            lastMove: Date.now() + Math.random() * SKELETON_MOVE_INTERVAL,  // Stagger
            lastAttack: 0,
            hp: 2
        });
    }
    
    function updateSkeletons() {
        const now = Date.now();
        
        for (let i = skeletons.length - 1; i >= 0; i--) {
            const skel = skeletons[i];
            
            // State timers
            if (skel.state === 'hit' && now - skel.stateTimer > 200) {
                skel.state = 'idle';
            }
            if (skel.state === 'attack' && now - skel.stateTimer > 400) {
                skel.state = 'idle';
            }
            
            // Grid distance to player
            const dx = player.gridX - skel.gridX;
            const dz = player.gridZ - skel.gridZ;
            const gridDist = Math.abs(dx) + Math.abs(dz);  // Manhattan distance
            
            // Move on grid toward player
            if (gridDist > 1 && skel.state === 'idle' && now - skel.lastMove > SKELETON_MOVE_INTERVAL) {
                // Pick cardinal direction toward player
                let moveX = 0, moveZ = 0;
                if (Math.abs(dx) >= Math.abs(dz)) {
                    moveX = dx > 0 ? 1 : -1;
                } else {
                    moveZ = dz > 0 ? 1 : -1;
                }
                
                // Check if target cell is walkable
                const newGridX = skel.gridX + moveX;
                const newGridZ = skel.gridZ + moveZ;
                if (!isWall(newGridX, newGridZ)) {
                    skel.gridX = newGridX;
                    skel.gridZ = newGridZ;
                    skel.lastMove = now;
                }
            } else if (gridDist === 1 && skel.state === 'idle') {
                // Adjacent to player - attack!
                // But only after grace period, and only from cardinal directions
                const isCardinal = (dx === 0 || dz === 0);  // Not diagonal
                const graceOver = now - floorStartTime > FLOOR_GRACE_PERIOD;
                
                if (isCardinal && graceOver && now - skel.lastAttack > SKELETON_ATTACK_COOLDOWN) {
                    skel.state = 'attack';
                    skel.stateTimer = now;
                    skel.lastAttack = now;
                    playerTakeDamage();  // Ouch!
                }
            }
            
            // Lerp render position to grid position
            const targetX = skel.gridX * CELL_SIZE;
            const targetZ = skel.gridZ * CELL_SIZE;
            skel.x += (targetX - skel.x) * SKELETON_LERP_SPEED;
            skel.z += (targetZ - skel.z) * SKELETON_LERP_SPEED;
            
            // Update sprite
            skel.sprite.position.x = skel.x;
            skel.sprite.position.z = skel.z;
            skel.sprite.position.y = 1.0 + Math.sin(now * 0.005 + i) * 0.05;
            
            skel.material.map = skeletonTextures[skel.state];
            skel.material.needsUpdate = true;
        }
    }
    
    function hitSkeleton(index) {
        const skel = skeletons[index];
        skel.hp--;
        skel.state = 'hit';
        skel.stateTimer = Date.now();
        
        if (skel.hp <= 0) {
            // Death!
            scene.remove(skel.sprite);
            skeletons.splice(index, 1);
            
            // Floor cleared?
            if (skeletons.length === 0) {
                showFloorText('CLEARED!');
                setTimeout(() => advanceFloor(), 1500);
            }
        }
    }
    
    // Spawn some skeletons in the maze
    function spawnInitialSkeletons() {
        // Find open cells to spawn in
        let spawned = 0;
        for (let z = 3; z < GRID_SIZE - 1 && spawned < 5; z++) {
            for (let x = 3; x < GRID_SIZE - 1 && spawned < 5; x++) {
                if (maze[z][x] === 0 && Math.random() < 0.15) {
                    spawnSkeleton(x, z);  // Grid coords, not world
                    spawned++;
                }
            }
        }
    }
    
    // Update our position in Firebase
    function broadcastPosition() {
        if (!window.db) return;
        
        const playerRef = window.db.ref('players/' + window.playerId);
        playerRef.set({
            x: player.x,
            z: player.z,
            dir: player.dir,
            timestamp: Date.now()
        });
        
        // Remove ourselves when we leave
        playerRef.onDisconnect().remove();
    }
    
    // Listen for other players
    function setupMultiplayer() {
        if (!window.db) {
            console.log('Firebase not available');
            return;
        }
        
        const playersRef = window.db.ref('players');
        
        // Listen for changes
        playersRef.on('value', (snapshot) => {
            const data = snapshot.val() || {};
            const now = Date.now();
            let count = 0;
            
            // Update or create lights for other players
            for (const id in data) {
                if (id === window.playerId) continue;  // Skip self
                
                const p = data[id];
                if (now - p.timestamp > STALE_TIMEOUT) continue;  // Skip stale
                
                count++;
                
                if (!otherPlayers[id]) {
                    // Create new ghost light + sprite
                    const light = new THREE.PointLight(GHOST_COLOR, 1.5, 8);
                    light.position.set(p.x, 1.2, p.z);
                    scene.add(light);
                    
                    // Billboard knight sprite with unique color
                    const ghostColor = getGhostColor(id);
                    const spriteMat = new THREE.SpriteMaterial({ 
                        map: knightTextures.idle,
                        transparent: true,
                        color: ghostColor
                    });
                    const sprite = new THREE.Sprite(spriteMat);
                    sprite.scale.set(1.4, 1.4, 1);
                    sprite.position.set(p.x, 1.0, p.z);
                    scene.add(sprite);
                    
                    // Match light color to sprite
                    light.color.setHex(ghostColor);
                    
                    otherPlayers[id] = { light, sprite, x: p.x, z: p.z, lastSeen: now };
                } else {
                    // Update position (lerp for smooth movement)
                    otherPlayers[id].x = p.x;
                    otherPlayers[id].z = p.z;
                    otherPlayers[id].lastSeen = now;
                }
            }
            
            // Remove stale players
            for (const id in otherPlayers) {
                if (!data[id] || now - data[id].timestamp > STALE_TIMEOUT) {
                    scene.remove(otherPlayers[id].light);
                    scene.remove(otherPlayers[id].sprite);
                    delete otherPlayers[id];
                }
            }
            
            // Update player count
            document.getElementById('players').textContent = '👻 ' + count;
        });
        
        // Broadcast position every 500ms
        setInterval(broadcastPosition, 500);
        
        // Cleanup stale entries periodically (only one client needs to do this)
        setInterval(() => {
            const now = Date.now();
            playersRef.once('value', (snapshot) => {
                const data = snapshot.val() || {};
                for (const id in data) {
                    if (now - data[id].timestamp > STALE_TIMEOUT) {
                        window.db.ref('players/' + id).remove();
                    }
                }
            });
        }, 10000);
        
        console.log('Multiplayer enabled! Player ID:', window.playerId);
    }
    
    // Lerp ghost lights + sprites in update loop
    function updateGhosts() {
        for (const id in otherPlayers) {
            const ghost = otherPlayers[id];
            // Smooth movement
            ghost.light.position.x += (ghost.x - ghost.light.position.x) * 0.1;
            ghost.light.position.z += (ghost.z - ghost.light.position.z) * 0.1;
            ghost.sprite.position.x = ghost.light.position.x;
            ghost.sprite.position.z = ghost.light.position.z;
            // Bobbing animation
            ghost.sprite.position.y = 1.0 + Math.sin(Date.now() * 0.003 + parseInt(id, 36)) * 0.1;
            
            // Flicker effect
            ghost.light.intensity = 1.2 + Math.sin(Date.now() * 0.01 + parseInt(id, 36)) * 0.3;
        }
    }
    
    init();
    setupMultiplayer();
    setupWorldSync();
    
    // Sync world state (floor) across all players
    function setupWorldSync() {
        if (!window.db) return;
        
        const worldRef = window.db.ref('world');
        
        // Listen for floor changes
        worldRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            
            // Sync to server floor (whether joining or advancing)
            if (data.floor !== currentFloor || data.mazeSeed !== mazeSeed) {
                currentFloor = data.floor;
                mazeSeed = data.mazeSeed;
                loadFloor(currentFloor, mazeSeed);
                showFloorText(currentFloor);
                updateFloorDisplay();
            }
        });
        
        // On first connect, check if world exists
        worldRef.once('value', (snapshot) => {
            if (!snapshot.val()) {
                // We're first! Set initial world state
                worldRef.set({
                    floor: 1,
                    mazeSeed: mazeSeed,
                    timestamp: Date.now()
                });
            }
        });
    }
    </script>
