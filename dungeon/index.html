<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Blocky Dungeon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #111;
            overflow: hidden;
            font-family: monospace;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        
        #game {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        
        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        #game { cursor: pointer; }
        
        #hud {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-size: 8px;
            font-family: 'Press Start 2P', monospace;
            z-index: 20;
            text-align: center;
        }
        
        /* Expression buttons */
        #expressions {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 30;
        }
        
        .expr-btn {
            width: 40px;
            height: 40px;
            border: 2px solid #444;
            border-radius: 8px;
            background: rgba(0,0,0,0.7);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .expr-btn:active {
            background: rgba(255,255,255,0.2);
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div id="game"></div>
    
    <div id="compass" style="position:fixed;top:20px;right:20px;color:#fff;font-size:24px;z-index:20;font-family:'Press Start 2P',monospace;">N</div>
    <div id="hearts" style="position:fixed;top:20px;left:50%;transform:translateX(-50%);font-size:16px;z-index:20;">❤️❤️❤️</div>
    <div id="players" style="position:fixed;top:20px;left:20px;color:#666;font-size:12px;z-index:20;">👻 0</div>
    
    <!-- Expression buttons -->
    <div id="expressions">
        <button class="expr-btn" data-expr="wave">👋</button>
        <button class="expr-btn" data-expr="laugh">😂</button>
        <button class="expr-btn" data-expr="alert">❗</button>
        <button class="expr-btn" data-expr="yes">👍</button>
        <button class="expr-btn" data-expr="no">❌</button>
    </div>
    
    <div id="hud">SWIPE TO MOVE · TAP TO ATTACK · 1-5 EMOTES</div>
    
    <!-- Firebase -->

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
    import { VRButton } from 'three/addons/webxr/VRButton.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    
    // C64 Dither Shader
    const C64DitherShader = {
        uniforms: {
            'tDiffuse': { value: null },
            'resolution': { value: new THREE.Vector2(320, 200) }
        },
        vertexShader: `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `,
        fragmentShader: `
            uniform sampler2D tDiffuse;
            uniform vec2 resolution;
            varying vec2 vUv;
            
            float bayer4(vec2 pos) {
                int x = int(mod(pos.x, 4.0));
                int y = int(mod(pos.y, 4.0));
                int index = x + y * 4;
                float m[16];
                m[0]=0.0; m[1]=8.0; m[2]=2.0; m[3]=10.0;
                m[4]=12.0; m[5]=4.0; m[6]=14.0; m[7]=6.0;
                m[8]=3.0; m[9]=11.0; m[10]=1.0; m[11]=9.0;
                m[12]=15.0; m[13]=7.0; m[14]=13.0; m[15]=5.0;
                return m[index] / 16.0;
            }
            
            void main() {
                vec2 pixel = floor(vUv * resolution) / resolution;
                vec4 color = texture2D(tDiffuse, pixel);
                vec2 pixelPos = vUv * resolution;
                float threshold = bayer4(pixelPos);
                float levels = 8.0;
                vec3 dithered = floor(color.rgb * levels + threshold) / levels;
                gl_FragColor = vec4(dithered, 1.0);
            }
        `
    };
    
    // ============================================
    // GAME CONFIG
    // ============================================
    let GRID_SIZE = 24;  // Will be set by bitmap
    const CELL_SIZE = 2;
    const MOVE_SPEED = 0.2;
    const TURN_SPEED = 0.18;
    
    // ============================================
    // TILE TYPES - Simple color mapping
    // ============================================
    // Paint these exact colors in your worldmap.png
    const TILES = {
        // RGBA hex → { blocked, name, optional spawn }
        0x000000FF: { blocked: true,  name: 'wall' },
        0x00FF00FF: { blocked: false, name: 'grass' },
        0x888888FF: { blocked: false, name: 'road' },
        0x0000FFFF: { blocked: true,  name: 'water' },
        0x8B4513FF: { blocked: true,  name: 'tree' },      // Spawn tree later
        0xFFFF00FF: { blocked: false, name: 'spawn' },     // Player spawn
        0xFF0000FF: { blocked: false, name: 'enemy' },     // Enemy spawn point
        0xFFFFFFFF: { blocked: false, name: 'floor' },     // Indoor floor
        0xD2691EFF: { blocked: true, name: 'house' },       // house
    };
    
    // Fallback for unknown colors
    const DEFAULT_TILE = { blocked: false, name: 'grass' };
    
    const DIRECTIONS = [
        { x: 0, z: -1, name: 'N' },
        { x: 1, z: 0, name: 'E' },
        { x: 0, z: 1, name: 'S' },
        { x: -1, z: 0, name: 'W' }
    ];
    
    // ============================================
    // EXPRESSIONS
    // ============================================
    const EXPRESSIONS = {
        wave: { emoji: '👋', duration: 2000 },
        laugh: { emoji: '😂', duration: 2000 },
        alert: { emoji: '❗', duration: 2500 },
        yes: { emoji: '👍', duration: 1500 },
        no: { emoji: '❌', duration: 1500 }
    };
    
    let currentExpression = null;
    let expressionTimer = 0;
    
    function emote(type) {
        if (!EXPRESSIONS[type]) return;
        currentExpression = type;
        expressionTimer = Date.now();
        broadcastPosition();  // Immediately sync
    }
    
    // Expression button handlers
    document.querySelectorAll('.expr-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            emote(btn.dataset.expr);
        });
    });
    
    // ============================================
    // PLAYER STATE
    // ============================================
    const player = {
        gridX: 2,
        gridZ: 2,
        dir: 0,
        x: 0, z: 0,
        rotation: 0,
        targetX: 0, targetZ: 0,
        targetRotation: 0,
        moving: false
    };
    
    // ============================================
    // WORLD DATA
    // ============================================
    let maze = [];          // 0 = walkable, 1 = blocked
    let tileData = [];      // Full tile info per cell
    let spawnPoint = { x: 2, z: 2 };
    let enemySpawns = [];
    
    // ============================================
    // BITMAP WORLD LOADER
    // ============================================
    function loadWorldFromBitmap(url) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            
            img.onload = () => {
                GRID_SIZE = Math.max(img.width, img.height);
                
                // Init arrays
                maze = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(0));
                tileData = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(null));
                enemySpawns = [];
                
                // Read pixels
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                
                for (let z = 0; z < img.height; z++) {
                    for (let x = 0; x < img.width; x++) {
                        const pixel = ctx.getImageData(x, z, 1, 1).data;
                        const rgba = (pixel[0] << 24) | (pixel[1] << 16) | (pixel[2] << 8) | pixel[3];
                        
                        // Find matching tile
                        const tile = TILES[rgba >>> 0] || DEFAULT_TILE;
                        tileData[z][x] = tile;
                        maze[z][x] = tile.blocked ? 1 : 0;
                        
                        // Track special tiles
                        if (tile.name === 'spawn') {
                            spawnPoint = { x, z };
                        } else if (tile.name === 'enemy') {
                            enemySpawns.push({ x, z });
                        }
                    }
                }
                
                console.log(`World loaded: ${img.width}x${img.height}, spawn at ${spawnPoint.x},${spawnPoint.z}, ${enemySpawns.length} enemy spawns`);
                resolve();
            };
            
            img.onerror = () => {
                console.warn('No worldmap.png found, generating fallback maze');
                generateFallbackMaze();
                resolve();
            };
            
            img.src = url;
        });
    }
    
    // Fallback if no bitmap exists yet
    function generateFallbackMaze() {
        GRID_SIZE = 16;
        maze = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(1));
        tileData = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(DEFAULT_TILE));
        
        // Simple room
        for (let z = 1; z < GRID_SIZE - 1; z++) {
            for (let x = 1; x < GRID_SIZE - 1; x++) {
                if (Math.random() > 0.25) {
                    maze[z][x] = 0;
                }
            }
        }
        
        // Clear spawn area
        for (let z = 1; z <= 4; z++) {
            for (let x = 1; x <= 4; x++) {
                maze[z][x] = 0;
            }
        }
        
        spawnPoint = { x: 2, z: 2 };
    }
    
    function isWall(x, z) {
        if (x < 0 || x >= GRID_SIZE || z < 0 || z >= GRID_SIZE) return true;
        return maze[z][x] === 1;
    }
    
    // ============================================
    // THREE.JS SETUP
    // ============================================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x2a2a4e);  // Lighter night sky
    scene.fog = new THREE.Fog(0x2a2a4e, 10, 40);  // Much further fog
    
    const RENDER_WIDTH = 320;
    const RENDER_HEIGHT = 240;
    
    const camera = new THREE.PerspectiveCamera(75, RENDER_WIDTH / RENDER_HEIGHT, 0.1, 100);
    
    // Camera rig for VR (we move the rig, not the camera)
    const cameraRig = new THREE.Group();
    cameraRig.add(camera);
    scene.add(cameraRig);
    
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(RENDER_WIDTH, RENDER_HEIGHT);
    renderer.setPixelRatio(1);
    document.getElementById('game').appendChild(renderer.domElement);
    
    // WebXR VR Support
    renderer.xr.enabled = true;
    const vrButton = VRButton.createButton(renderer);
    vrButton.style.bottom = '100px';  // Above emote buttons
    document.body.appendChild(vrButton);
    
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const ditherPass = new ShaderPass(C64DitherShader);
    composer.addPass(ditherPass);
    
    const ambientLight = new THREE.AmbientLight(0xaabbcc, 3.0);  // Strong ambient
    scene.add(ambientLight);
    
    // Directional moonlight from above
    const moonLight = new THREE.DirectionalLight(0x8899bb, 2.0);
    moonLight.position.set(10, 20, 10);
    scene.add(moonLight);
    
    const playerLight = new THREE.PointLight(0xffffee, 4, 14);  // Torch
    playerLight.position.set(0, 1, 0);
    scene.add(playerLight);
    
    // ============================================
    // TEXTURES
    // ============================================
    const textureLoader = new THREE.TextureLoader();
    
    function loadPixelTexture(path) {
        const tex = textureLoader.load(path);
        tex.magFilter = THREE.NearestFilter;
        tex.minFilter = THREE.NearestFilter;
        tex.wrapS = THREE.RepeatWrapping;
        tex.wrapT = THREE.RepeatWrapping;
        tex.colorSpace = THREE.SRGBColorSpace;
        return tex;
    }
    
    const wallTex = loadPixelTexture('textures/wall.png');
    const floorTex = loadPixelTexture('textures/floor.png');
    const ceilingTex = loadPixelTexture('textures/ceiling.png');
    
    floorTex.repeat.set(GRID_SIZE, GRID_SIZE);
    ceilingTex.repeat.set(GRID_SIZE, GRID_SIZE);
    
    const wallMaterial = new THREE.MeshStandardMaterial({ map: wallTex, roughness: 0.9 });
    const floorMaterial = new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.95 });
    
    // Tile-specific materials (placeholder colors until you add textures)
    const tileMaterials = {
        grass: new THREE.MeshStandardMaterial({ color: 0x3d6b2a, roughness: 0.95 }),
        road: new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.9 }),
        water: new THREE.MeshStandardMaterial({ color: 0x2244aa, roughness: 0.3, metalness: 0.5 }),
        floor: new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.95 }),
        spawn: new THREE.MeshStandardMaterial({ color: 0x888855, roughness: 0.9 }),  // Slightly yellow
        enemy: new THREE.MeshStandardMaterial({ color: 0x3d6b2a, roughness: 0.95 }), // Same as grass
        wall: wallMaterial,
        tree: new THREE.MeshStandardMaterial({ color: 0x2d4a1f, roughness: 0.95 }),  // Darker green
    };
    const defaultTileMaterial = tileMaterials.grass;
    
    // ============================================
    // 3D MODEL LOADING
    // ============================================
    const gltfLoader = new GLTFLoader();
    
    // Model registry - maps tile names to loaded GLTF scenes
    const tileModels = {};
    
    // Model config: which tiles use 3D models instead of primitives
    // Add entries here as you create models
    const MODEL_CONFIG = {
        'house': { path: 'models/house.glb', scale: 1.0, yOffset: 0 },
        // 'wall': { path: 'models/wall.glb', scale: 1.0, yOffset: 0 },
        // 'tree': { path: 'models/tree.glb', scale: 1.0, yOffset: 0 },
    };
    
    /**
     * Load all configured 3D models
     * @returns {Promise} Resolves when all models are loaded
     */
    async function loadModels() {
        const entries = Object.entries(MODEL_CONFIG);
        if (entries.length === 0) {
            console.log('[Models] No models configured, using primitives');
            return;
        }
        
        console.log(`[Models] Loading ${entries.length} models...`);
        
        const promises = entries.map(([tileName, config]) => {
            return new Promise((resolve, reject) => {
                gltfLoader.load(
                    config.path,
                    (gltf) => {
                        // Store the scene (contains all meshes)
                        const model = gltf.scene;
                        
                        // Apply scale from config
                        model.scale.setScalar(config.scale || 1.0);
                        
                        // Store for cloning later
                        tileModels[tileName] = {
                            scene: model,
                            yOffset: config.yOffset || 0
                        };
                        
                        console.log(`[Models] Loaded: ${tileName} from ${config.path}`);
                        resolve();
                    },
                    undefined,  // onProgress
                    (error) => {
                        console.warn(`[Models] Failed to load ${tileName}: ${error.message}`);
                        resolve();  // Don't reject - fall back to primitive
                    }
                );
            });
        });
        
        await Promise.all(promises);
        console.log(`[Models] Loaded ${Object.keys(tileModels).length}/${entries.length} models`);
    }
    
    /**
     * Create a tile mesh - uses 3D model if available, otherwise primitive
     */
    function createTileMesh(tileName, isBlocked) {
        // Check if we have a model for this tile type
        if (tileModels[tileName]) {
            const modelData = tileModels[tileName];
            const clone = modelData.scene.clone();
            clone.userData.yOffset = modelData.yOffset;
            return clone;
        }
        
        // Fallback to primitives
        if (isBlocked) {
            const geom = new THREE.BoxGeometry(CELL_SIZE, CELL_SIZE, CELL_SIZE);
            const mat = tileMaterials[tileName] || wallMaterial;
            return new THREE.Mesh(geom, mat);
        } else {
            const geom = new THREE.PlaneGeometry(CELL_SIZE, CELL_SIZE);
            const mat = tileMaterials[tileName] || defaultTileMaterial;
            const mesh = new THREE.Mesh(geom, mat);
            mesh.rotation.x = -Math.PI / 2;
            return mesh;
        }
    }
    
    // ============================================
    // BUILD LEVEL
    // ============================================
    function buildLevel() {
        // Clear existing (keep lights)
        const toRemove = [];
        scene.traverse(obj => {
            if (obj.isMesh || obj.isGroup) toRemove.push(obj);
        });
        toRemove.forEach(obj => {
            if (obj.parent) obj.parent.remove(obj);
        });
        
        // Tiles that render as floor even when blocked (props on top of floor)
        const flatBlockedTiles = ['water', 'tree'];
        
        for (let z = 0; z < GRID_SIZE; z++) {
            for (let x = 0; x < GRID_SIZE; x++) {
                const tile = tileData[z]?.[x] || DEFAULT_TILE;
                const isFlat = flatBlockedTiles.includes(tile.name);
                const isBlocked = maze[z][x] === 1;
                
                if (isBlocked && !isFlat) {
                    // Blocked wall: place cube or 3D model
                    const mesh = createTileMesh(tile.name, true);
                    const yOffset = mesh.userData.yOffset || 0;
                    mesh.position.set(x * CELL_SIZE, CELL_SIZE / 2 + yOffset, z * CELL_SIZE);
                    scene.add(mesh);
                } else {
                    // Floor tile first
                    const floorMesh = createTileMesh(isFlat ? 'floor' : tile.name, false);
                    floorMesh.position.set(x * CELL_SIZE, 0.01, z * CELL_SIZE);
                    scene.add(floorMesh);
                    
                    // If flat-blocked (like tree), add the prop on top
                    if (isFlat && isBlocked) {
                        const propMesh = createTileMesh(tile.name, true);
                        const yOffset = propMesh.userData.yOffset || 0;
                        propMesh.position.set(x * CELL_SIZE, CELL_SIZE / 2 + yOffset, z * CELL_SIZE);
                        scene.add(propMesh);
                    }
                }
            }
        }
    }
    
    // ============================================
    // PLAYER MOVEMENT
    // ============================================
    let isGameOver = false;
    
    function moveForward() {
        if (isGameOver || player.moving) return;
        
        const dir = DIRECTIONS[player.dir];
        const newX = player.gridX + dir.x;
        const newZ = player.gridZ + dir.z;
        
        if (!isWall(newX, newZ)) {
            player.gridX = newX;
            player.gridZ = newZ;
            player.targetX = newX * CELL_SIZE;
            player.targetZ = newZ * CELL_SIZE;
            player.moving = true;
        }
    }
    
    function moveBackward() {
        if (isGameOver || player.moving) return;
        
        const dir = DIRECTIONS[player.dir];
        const newX = player.gridX - dir.x;
        const newZ = player.gridZ - dir.z;
        
        if (!isWall(newX, newZ)) {
            player.gridX = newX;
            player.gridZ = newZ;
            player.targetX = newX * CELL_SIZE;
            player.targetZ = newZ * CELL_SIZE;
            player.moving = true;
        }
    }
    
    function turnLeft() {
        if (isGameOver || player.moving) return;
        player.dir = (player.dir + 3) % 4;
        player.targetRotation = player.dir * Math.PI / 2;
        player.moving = true;
        updateCompass();
    }
    
    function turnRight() {
        if (isGameOver || player.moving) return;
        player.dir = (player.dir + 1) % 4;
        player.targetRotation = player.dir * Math.PI / 2;
        player.moving = true;
        updateCompass();
    }
    
    function strafeLeft() {
        if (isGameOver || player.moving) return;
        
        // Move perpendicular to facing direction (left)
        const leftDir = DIRECTIONS[(player.dir + 3) % 4];
        const newX = player.gridX + leftDir.x;
        const newZ = player.gridZ + leftDir.z;
        
        if (!isWall(newX, newZ)) {
            player.gridX = newX;
            player.gridZ = newZ;
            player.targetX = newX * CELL_SIZE;
            player.targetZ = newZ * CELL_SIZE;
            player.moving = true;
        }
    }
    
    function strafeRight() {
        if (isGameOver || player.moving) return;
        
        // Move perpendicular to facing direction (right)
        const rightDir = DIRECTIONS[(player.dir + 1) % 4];
        const newX = player.gridX + rightDir.x;
        const newZ = player.gridZ + rightDir.z;
        
        if (!isWall(newX, newZ)) {
            player.gridX = newX;
            player.gridZ = newZ;
            player.targetX = newX * CELL_SIZE;
            player.targetZ = newZ * CELL_SIZE;
            player.moving = true;
        }
    }
    
    function updateCompass() {
        document.getElementById('compass').textContent = DIRECTIONS[player.dir].name;
    }
    
    // ============================================
    // INPUT
    // ============================================
    let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
    const SWIPE_THRESHOLD = 30;
    const TAP_THRESHOLD = 10;
    const TAP_TIME = 200;
    
    document.addEventListener('touchstart', (e) => {
        if (e.target.closest('#expressions')) return;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        touchStartTime = Date.now();
    }, { passive: true });
    
    document.addEventListener('touchend', (e) => {
        if (e.target.closest('#expressions')) return;
        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;
        const deltaX = touchEndX - touchStartX;
        const deltaY = touchEndY - touchStartY;
        const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
        const elapsed = Date.now() - touchStartTime;
        
        if (distance < TAP_THRESHOLD && elapsed < TAP_TIME) {
            playerAttack();
            return;
        }
        
        if (distance > SWIPE_THRESHOLD) {
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                if (deltaX > 0) turnRight();
                else turnLeft();
            } else {
                if (deltaY < 0) moveForward();
                else moveBackward();
            }
        }
    }, { passive: true });
    
    document.addEventListener('keydown', (e) => {
        switch (e.key) {
            case 'ArrowUp': case 'w': case 'W': moveForward(); break;
            case 'ArrowDown': case 's': case 'S': moveBackward(); break;
            case 'a': case 'A': strafeLeft(); break;
            case 'd': case 'D': strafeRight(); break;
            case 'ArrowLeft': case 'q': case 'Q': turnLeft(); break;
            case 'ArrowRight': case 'e': case 'E': turnRight(); break;
            case ' ': playerAttack(); break;
            case '1': emote('wave'); break;
            case '2': emote('laugh'); break;
            case '3': emote('alert'); break;
            case '4': emote('yes'); break;
            case '5': emote('no'); break;
        }
    });
    
    // ============================================
    // COMBAT
    // ============================================
    const skeletonTextures = {
        idle: loadPixelTexture('textures/skeleton_idle.png'),
        attack: loadPixelTexture('textures/skeleton_attack.png'),
        hit: loadPixelTexture('textures/skeleton_hit.png')
    };
    
    const knightTextures = {
        idle: loadPixelTexture('textures/knight_idle.png'),
        swing: loadPixelTexture('textures/knight_swing.png'),
        hit: loadPixelTexture('textures/knight_hit.png')
    };
    
    const playerMaterial = new THREE.SpriteMaterial({ map: knightTextures.idle, transparent: true });
    const playerSprite = new THREE.Sprite(playerMaterial);
    playerSprite.scale.set(1.4, 1.4, 1);
    scene.add(playerSprite);
    
    const playerCombat = {
        state: 'idle',
        stateTimer: 0,
        hp: 3,
        maxHp: 3,
        lastDamage: 0,
        lastHeal: 0
    };
    
    const REGEN_DELAY = 5000;
    const REGEN_INTERVAL = 8000;
    
    function updateHeartsDisplay() {
        const hearts = document.getElementById('hearts');
        hearts.textContent = '❤️'.repeat(playerCombat.hp) + '🖤'.repeat(playerCombat.maxHp - playerCombat.hp);
    }
    
    function playerTakeDamage() {
        if (playerCombat.state === 'hit') return;
        
        playerCombat.hp--;
        playerCombat.state = 'hit';
        playerCombat.stateTimer = Date.now();
        playerCombat.lastDamage = Date.now();
        updateHeartsDisplay();
        flashScreen('#ff0000');
        
        if (playerCombat.hp <= 0) {
            gameOver();
        }
    }
    
    function flashScreen(color) {
        const flash = document.createElement('div');
        flash.style.cssText = `position:fixed;top:0;left:0;right:0;bottom:0;background:${color};opacity:0.4;z-index:50;pointer-events:none;`;
        document.body.appendChild(flash);
        setTimeout(() => flash.remove(), 150);
    }
    
    function gameOver() {
        isGameOver = true;
        showMessage('💀 RESPAWNING...');
        
        setTimeout(() => {
            playerCombat.hp = playerCombat.maxHp;
            updateHeartsDisplay();
            // Respawn at start
            player.gridX = 2;
            player.gridZ = 2;
            player.x = player.gridX * CELL_SIZE;
            player.z = player.gridZ * CELL_SIZE;
            player.targetX = player.x;
            player.targetZ = player.z;
            isGameOver = false;
        }, 2000);
    }
    
    function showMessage(text) {
        const div = document.createElement('div');
        div.textContent = text;
        div.style.cssText = "position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:20px;color:#fff;font-family:'Press Start 2P',monospace;z-index:100;text-shadow:0 0 20px #000;";
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 1500);
    }
    
    function playerAttack() {
        if (isGameOver || playerCombat.state !== 'idle') return;
        
        playerCombat.state = 'swing';
        playerCombat.stateTimer = Date.now();
        
        const dir = DIRECTIONS[player.dir];
        const targetX = player.gridX + dir.x;
        const targetZ = player.gridZ + dir.z;
        
        for (let i = skeletons.length - 1; i >= 0; i--) {
            const skel = skeletons[i];
            if (skel.gridX === targetX && skel.gridZ === targetZ) {
                hitSkeleton(i);
                break;
            }
        }
    }
    
    // ============================================
    // SKELETONS (respawn instead of floor advance)
    // ============================================
    const skeletons = [];
    const SKELETON_MOVE_INTERVAL = 800;
    const SKELETON_ATTACK_COOLDOWN = 2500;
    const SKELETON_LERP_SPEED = 0.1;
    const MAX_SKELETONS = 6;
    const SKELETON_RESPAWN_TIME = 15000;  // Respawn every 15s if below max
    
    let lastSkeletonSpawn = Date.now();
    
    function spawnSkeleton(gridX, gridZ) {
        const material = new THREE.SpriteMaterial({ map: skeletonTextures.idle, transparent: true });
        const sprite = new THREE.Sprite(material);
        sprite.scale.set(1.5, 1.5, 1);
        const worldX = gridX * CELL_SIZE;
        const worldZ = gridZ * CELL_SIZE;
        sprite.position.set(worldX, 1.0, worldZ);
        scene.add(sprite);
        
        skeletons.push({
            sprite, material,
            gridX, gridZ,
            x: worldX, z: worldZ,
            state: 'idle',
            stateTimer: 0,
            lastMove: Date.now() + Math.random() * SKELETON_MOVE_INTERVAL,
            lastAttack: 0,
            hp: 2,
            adjacentSince: null
        });
    }
    
    function findSpawnPoint() {
        // Find a random open cell far from player
        for (let attempts = 0; attempts < 50; attempts++) {
            const x = 4 + Math.floor(Math.random() * (GRID_SIZE - 6));
            const z = 4 + Math.floor(Math.random() * (GRID_SIZE - 6));
            
            if (maze[z][x] === 0) {
                // Check distance from player
                const dist = Math.abs(x - player.gridX) + Math.abs(z - player.gridZ);
                if (dist > 5) {
                    // Check no skeleton already there
                    const occupied = skeletons.some(s => s.gridX === x && s.gridZ === z);
                    if (!occupied) return { x, z };
                }
            }
        }
        return null;
    }
    
    function updateSkeletons() {
        const now = Date.now();
        
        // Respawn logic - only if enemy spawns were defined in the map
        if (enemySpawns.length > 0 && skeletons.length < MAX_SKELETONS && now - lastSkeletonSpawn > SKELETON_RESPAWN_TIME) {
            // Respawn at original spawn points
            const available = enemySpawns.filter(p => !skeletons.some(s => s.gridX === p.x && s.gridZ === p.z));
            if (available.length > 0) {
                const point = available[Math.floor(Math.random() * available.length)];
                spawnSkeleton(point.x, point.z);
                lastSkeletonSpawn = now;
            }
        }
        
        for (let i = skeletons.length - 1; i >= 0; i--) {
            const skel = skeletons[i];
            
            if (skel.state === 'hit' && now - skel.stateTimer > 200) skel.state = 'idle';
            if (skel.state === 'attack' && now - skel.stateTimer > 400) skel.state = 'idle';
            
            const dx = player.gridX - skel.gridX;
            const dz = player.gridZ - skel.gridZ;
            const gridDist = Math.abs(dx) + Math.abs(dz);
            
            if (gridDist > 1 && skel.state === 'idle' && now - skel.lastMove > SKELETON_MOVE_INTERVAL) {
                let moveX = 0, moveZ = 0;
                if (Math.abs(dx) >= Math.abs(dz)) {
                    moveX = dx > 0 ? 1 : -1;
                } else {
                    moveZ = dz > 0 ? 1 : -1;
                }
                
                const newGridX = skel.gridX + moveX;
                const newGridZ = skel.gridZ + moveZ;
                if (!isWall(newGridX, newGridZ)) {
                    skel.gridX = newGridX;
                    skel.gridZ = newGridZ;
                    skel.lastMove = now;
                }
            } else if (gridDist === 1 && skel.state === 'idle') {
                const isCardinal = (dx === 0 || dz === 0);
                
                if (!skel.adjacentSince) skel.adjacentSince = now;
                const adjacentLongEnough = now - skel.adjacentSince > 600;
                
                if (isCardinal && adjacentLongEnough && now - skel.lastAttack > SKELETON_ATTACK_COOLDOWN) {
                    skel.state = 'attack';
                    skel.stateTimer = now;
                    skel.lastAttack = now;
                    playerTakeDamage();
                }
            } else {
                skel.adjacentSince = null;
            }
            
            // Lerp position
            const targetX = skel.gridX * CELL_SIZE;
            const targetZ = skel.gridZ * CELL_SIZE;
            skel.x += (targetX - skel.x) * SKELETON_LERP_SPEED;
            skel.z += (targetZ - skel.z) * SKELETON_LERP_SPEED;
            
            skel.sprite.position.x = skel.x;
            skel.sprite.position.z = skel.z;
            skel.sprite.position.y = 1.0 + Math.sin(now * 0.005 + i) * 0.05;
            
            skel.material.map = skeletonTextures[skel.state];
            skel.material.needsUpdate = true;
        }
    }
    
    function hitSkeleton(index) {
        const skel = skeletons[index];
        skel.hp--;
        skel.state = 'hit';
        skel.stateTimer = Date.now();
        
        if (skel.hp <= 0) {
            scene.remove(skel.sprite);
            skeletons.splice(index, 1);
            // No floor advance - just respawn later
        }
    }
    
    function spawnInitialSkeletons() {
        // Only spawn at red pixels - no fallback random spawns
        if (enemySpawns.length > 0) {
            enemySpawns.forEach(point => {
                if (skeletons.length < MAX_SKELETONS) {
                    spawnSkeleton(point.x, point.z);
                }
            });
        }
        // No red pixels = no skeletons (peaceful town!)
    }
    
    // ============================================
    // MULTIPLAYER
    // ============================================
    const otherPlayers = {};
    const STALE_TIMEOUT = 30000;
    
    const GHOST_COLORS = [
        0xff6666, 0x66ffff, 0xffb8ff, 0xffb852,
        0x66ff66, 0xffff66, 0xb866ff, 0x66b8ff
    ];
    
    function getGhostColor(playerId) {
        let hash = 0;
        for (let i = 0; i < playerId.length; i++) {
            hash = ((hash << 5) - hash) + playerId.charCodeAt(i);
        }
        return GHOST_COLORS[Math.abs(hash) % GHOST_COLORS.length];
    }
    
    function broadcastPosition() {
        if (!window.db) return;
        
        const playerRef = window.db.ref('players/' + window.playerId);
        const data = {
            x: player.x,
            z: player.z,
            dir: player.dir,
            timestamp: Date.now()
        };
        
        // Add expression if active
        if (currentExpression && Date.now() - expressionTimer < EXPRESSIONS[currentExpression].duration) {
            data.expression = currentExpression;
            data.expressionTime = expressionTimer;
        }
        
        playerRef.set(data);
        playerRef.onDisconnect().remove();
    }
    
    function setupMultiplayer() {
        if (!window.db) return;
        
        const playersRef = window.db.ref('players');
        
        playersRef.on('value', (snapshot) => {
            const data = snapshot.val() || {};
            const now = Date.now();
            let count = 0;
            
            for (const id in data) {
                if (id === window.playerId) continue;
                
                const p = data[id];
                if (now - p.timestamp > STALE_TIMEOUT) continue;
                
                count++;
                
                if (!otherPlayers[id]) {
                    const ghostColor = getGhostColor(id);
                    const light = new THREE.PointLight(ghostColor, 1.5, 8);
                    light.position.set(p.x, 1.2, p.z);
                    scene.add(light);
                    
                    const spriteMat = new THREE.SpriteMaterial({ 
                        map: knightTextures.idle,
                        transparent: true,
                        color: ghostColor
                    });
                    const sprite = new THREE.Sprite(spriteMat);
                    sprite.scale.set(1.4, 1.4, 1);
                    sprite.position.set(p.x, 1.0, p.z);
                    scene.add(sprite);
                    
                    // Expression bubble (hidden by default)
                    const canvas = document.createElement('canvas');
                    canvas.width = 64;
                    canvas.height = 64;
                    const bubbleTex = new THREE.CanvasTexture(canvas);
                    bubbleTex.magFilter = THREE.NearestFilter;
                    const bubbleMat = new THREE.SpriteMaterial({ map: bubbleTex, transparent: true });
                    const bubble = new THREE.Sprite(bubbleMat);
                    bubble.scale.set(0.8, 0.8, 1);
                    bubble.visible = false;
                    scene.add(bubble);
                    
                    otherPlayers[id] = { 
                        light, sprite, bubble, bubbleTex, bubbleCanvas: canvas,
                        x: p.x, z: p.z, lastSeen: now,
                        expression: null, expressionTime: 0
                    };
                } else {
                    otherPlayers[id].x = p.x;
                    otherPlayers[id].z = p.z;
                    otherPlayers[id].lastSeen = now;
                    
                    // Update expression
                    if (p.expression && p.expressionTime) {
                        const exprDuration = EXPRESSIONS[p.expression]?.duration || 2000;
                        if (now - p.expressionTime < exprDuration) {
                            if (otherPlayers[id].expression !== p.expression) {
                                otherPlayers[id].expression = p.expression;
                                otherPlayers[id].expressionTime = p.expressionTime;
                                drawExpressionBubble(otherPlayers[id], p.expression);
                            }
                        } else {
                            otherPlayers[id].expression = null;
                            otherPlayers[id].bubble.visible = false;
                        }
                    } else {
                        otherPlayers[id].expression = null;
                        otherPlayers[id].bubble.visible = false;
                    }
                }
            }
            
            // Remove stale
            for (const id in otherPlayers) {
                if (!data[id] || now - data[id].timestamp > STALE_TIMEOUT) {
                    scene.remove(otherPlayers[id].light);
                    scene.remove(otherPlayers[id].sprite);
                    scene.remove(otherPlayers[id].bubble);
                    delete otherPlayers[id];
                }
            }
            
            document.getElementById('players').textContent = '👻 ' + count;
        });
        
        setInterval(broadcastPosition, 500);
        
        // Cleanup stale
        setInterval(() => {
            const now = Date.now();
            playersRef.once('value', (snapshot) => {
                const data = snapshot.val() || {};
                for (const id in data) {
                    if (now - data[id].timestamp > STALE_TIMEOUT) {
                        window.db.ref('players/' + id).remove();
                    }
                }
            });
        }, 10000);
    }
    
    function drawExpressionBubble(player, expression) {
        const emoji = EXPRESSIONS[expression]?.emoji || '❓';
        const ctx = player.bubbleCanvas.getContext('2d');
        ctx.clearRect(0, 0, 64, 64);
        ctx.font = '40px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(emoji, 32, 32);
        player.bubbleTex.needsUpdate = true;
        player.bubble.visible = true;
    }
    
    function updateGhosts() {
        const now = Date.now();
        
        for (const id in otherPlayers) {
            const ghost = otherPlayers[id];
            ghost.light.position.x += (ghost.x - ghost.light.position.x) * 0.1;
            ghost.light.position.z += (ghost.z - ghost.light.position.z) * 0.1;
            ghost.sprite.position.x = ghost.light.position.x;
            ghost.sprite.position.z = ghost.light.position.z;
            ghost.sprite.position.y = 1.0 + Math.sin(now * 0.003 + parseInt(id, 36)) * 0.1;
            ghost.light.intensity = 1.2 + Math.sin(now * 0.01 + parseInt(id, 36)) * 0.3;
            
            // Position bubble beside sprite (avoids ceiling clip)
            ghost.bubble.position.copy(ghost.sprite.position);
            ghost.bubble.position.y += 0.3;
            ghost.bubble.position.x += 0.5;
            
            // Check if expression expired
            if (ghost.expression) {
                const exprDuration = EXPRESSIONS[ghost.expression]?.duration || 2000;
                if (now - ghost.expressionTime > exprDuration) {
                    ghost.expression = null;
                    ghost.bubble.visible = false;
                }
            }
        }
    }
    
    // ============================================
    // GAME LOOP
    // ============================================
    function lerp(a, b, t) { return a + (b - a) * t; }
    
    function lerpAngle(a, b, t) {
        let diff = b - a;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        return a + diff * t;
    }
    
    let moveTimer = 0;
    let vrInputCooldown = 0;  // Prevent rapid-fire from held stick
    
    function handleVRInput() {
        const session = renderer.xr.getSession();
        if (!session) return;
        
        const now = Date.now();
        if (now - vrInputCooldown < 300) return;  // Cooldown between inputs
        
        for (const source of session.inputSources) {
            if (source.gamepad) {
                // Left stick: move forward/back
                // Right stick: turn left/right
                const axes = source.gamepad.axes;
                const isLeft = source.handedness === 'left';
                
                if (isLeft && axes.length >= 4) {
                    // Left thumbstick Y (forward/back)
                    if (axes[3] < -0.5) { moveForward(); vrInputCooldown = now; }
                    else if (axes[3] > 0.5) { moveBackward(); vrInputCooldown = now; }
                    // Left thumbstick X (strafe)
                    else if (axes[2] < -0.5) { strafeLeft(); vrInputCooldown = now; }
                    else if (axes[2] > 0.5) { strafeRight(); vrInputCooldown = now; }
                } else if (!isLeft && axes.length >= 4) {
                    // Right thumbstick for turning
                    if (axes[2] < -0.5) { turnLeft(); vrInputCooldown = now; }
                    else if (axes[2] > 0.5) { turnRight(); vrInputCooldown = now; }
                }
                
                // Trigger = attack
                const buttons = source.gamepad.buttons;
                if (buttons[0]?.pressed) { playerAttack(); vrInputCooldown = now; }
            }
        }
    }
    
    function update() {
        // Handle VR controller input
        if (renderer.xr.isPresenting) {
            handleVRInput();
        }
        
        player.x = lerp(player.x, player.targetX, MOVE_SPEED);
        player.z = lerp(player.z, player.targetZ, MOVE_SPEED);
        player.rotation = lerpAngle(player.rotation, player.targetRotation, TURN_SPEED);
        
        const posDiff = Math.abs(player.x - player.targetX) + Math.abs(player.z - player.targetZ);
        const rotDiff = Math.abs(player.rotation - player.targetRotation);
        
        if (player.moving) {
            moveTimer++;
            if ((posDiff < 0.05 && rotDiff < 0.05) || moveTimer > 60) {
                player.x = player.targetX;
                player.z = player.targetZ;
                player.rotation = player.targetRotation;
                player.moving = false;
                moveTimer = 0;
            }
        }
        
        // Move camera rig (works for both flat and VR)
        // VR players are "crouched" so they can't see over walls
        const eyeHeight = renderer.xr.isPresenting ? 0.0 : 1;
        cameraRig.position.set(player.x, eyeHeight, player.z);
        cameraRig.rotation.y = -player.rotation;
        playerLight.position.set(player.x, 1.5, player.z);
        playerSprite.position.set(player.x, 1.0, player.z);
        
        // Player combat state
        const now = Date.now();
        if (playerCombat.state === 'swing' && now - playerCombat.stateTimer > 300) playerCombat.state = 'idle';
        if (playerCombat.state === 'hit' && now - playerCombat.stateTimer > 200) playerCombat.state = 'idle';
        playerMaterial.map = knightTextures[playerCombat.state];
        playerMaterial.needsUpdate = true;
        
        // Health regen
        if (playerCombat.hp < playerCombat.maxHp && playerCombat.hp > 0) {
            const timeSinceDamage = now - playerCombat.lastDamage;
            const timeSinceHeal = now - playerCombat.lastHeal;
            
            if (timeSinceDamage > REGEN_DELAY && timeSinceHeal > REGEN_INTERVAL) {
                playerCombat.hp++;
                playerCombat.lastHeal = now;
                updateHeartsDisplay();
            }
        }
        
        // Clear expression after duration
        if (currentExpression && now - expressionTimer > EXPRESSIONS[currentExpression].duration) {
            currentExpression = null;
        }
    }
    
    function animate() {
        update();
        updateGhosts();
        updateSkeletons();
        
        // In VR, render directly (post-processing doesn't work well in XR)
        if (renderer.xr.isPresenting) {
            renderer.render(scene, camera);
        } else {
            composer.render();  // C64 dither for flat screen
        }
    }
    
    // Use setAnimationLoop for XR compatibility (replaces requestAnimationFrame)
    renderer.setAnimationLoop(animate);
    
    // ============================================
    // INIT
    // ============================================
    async function init() {
        showMessage('Loading world...');
        
        // Load 3D models first (if any configured)
        await loadModels();
        
        // Try to load bitmap, fall back to generated maze
        await loadWorldFromBitmap('worldmap.png');
        
        buildLevel();
        spawnInitialSkeletons();
        
        // Use spawn point from map
        player.gridX = spawnPoint.x;
        player.gridZ = spawnPoint.z;
        player.dir = 2;  // South
        player.x = player.gridX * CELL_SIZE;
        player.z = player.gridZ * CELL_SIZE;
        player.targetX = player.x;
        player.targetZ = player.z;
        player.rotation = player.dir * Math.PI / 2;
        player.targetRotation = player.rotation;
        
        updateCompass();
        setupMultiplayer();
        
        console.log('Blocky Dungeon - Open World Mode');
        console.log('Player ID:', window.playerId);
    }
    
    init();
    </script>
</body>
